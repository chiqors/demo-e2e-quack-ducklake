services:
  minio:
    image: minio/minio:latest
    container_name: lake_storage_s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_pass
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 5
  
  postgres:
    image: postgres:18-alpine
    container_name: lake_metadata_db
    environment:
      POSTGRES_USER: lake_admin
      POSTGRES_PASSWORD: secret_metadata_pass
      POSTGRES_DB: ducklake_catalog
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lake_admin -d ducklake_catalog"]
      interval: 3s
      timeout: 3s
      retries: 5

  minio-provisioner:
    image: minio/mc:latest
    container_name: lake_storage_provisioner
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio_provision.sh:/minio_provision.sh
    entrypoint: /bin/sh /minio_provision.sh

  quack-server:
    build: ./quack-server
    container_name: duckdb_quack_server
    ports:
      - "9494:9494"
    depends_on:
      postgres:
        condition: service_healthy
      minio-provisioner:
        condition: service_completed_successfully
    environment:
      - PG_CONN=dbname=ducklake_catalog host=postgres user=lake_admin password=secret_metadata_pass
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minio_admin
      - S3_SECRET_KEY=minio_secret_pass
      - S3_BUCKET=healthcare-lake
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('127.0.0.1', 9494), 2); s.close()"]
      interval: 3s
      timeout: 3s
      retries: 10

  duckdb-consumer:
    build: ./duckdb-consumer
    container_name: duckdb_quack_client
    depends_on:
      quack-server:
        condition: service_healthy
    environment:
      - QUACK_HOST=quack-server:9494
    command: npm start
